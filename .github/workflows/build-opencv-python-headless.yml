name: Build OpenCV Python Headless wheel

on:
  workflow_dispatch:
    inputs:
      opencv_python_repo:
        description: 'opencv-python repository in owner/repo format (e.g. a fork)'
        required: false
        default: 'opencv/opencv-python'
      opencv_python_ref:
        description: 'Git ref to build (branch, tag, or commit SHA)'
        required: false
        default: '4.x'
      release_version:
        description: 'Release version stamp (e.g. 4.13.0). Leave empty to only upload as workflow artifact.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-wheels:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
      options: --user root
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build parameters
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.release_version }}"
          REPO="${{ inputs.opencv_python_repo }}"
          COMMIT="${{ inputs.opencv_python_ref }}"

          # Fall back to a snapshot stamp when no release version is provided
          STAMP="${VERSION:-snapshot-$(date -u +%Y%m%d)-${GITHUB_SHA::7}}"
          echo "version=$STAMP" >> $GITHUB_OUTPUT
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT
          echo "opencv_python_repo=$REPO" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Building $REPO@$COMMIT as version $STAMP"

      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gh git ca-certificates build-essential pkg-config ninja-build

      - name: Install Python
        run: |
          apt-get install -y --no-install-recommends python3 python3-dev python3-pip

      - name: Install FFmpeg dependencies
        run: |
          apt-get install -y --no-install-recommends libavcodec-dev libavformat-dev libavutil-dev libswscale-dev

      - name: Install Media I/O dependencies
        run: |
          apt-get install -y --no-install-recommends libjpeg62-turbo-dev libpng-dev libtiff-dev libwebp-dev libopenblas-dev liblapacke-dev

      - name: Install GStreamer dependencies
        run: |
          apt-get install -y --no-install-recommends libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Clone opencv-python repo
        run: |
          COMMIT="${{ steps.version.outputs.commit }}"
          git clone --depth 1 "https://github.com/${{ steps.version.outputs.opencv_python_repo }}.git" opencv-python
          cd opencv-python
          git fetch --depth 1 origin "$COMMIT"
          git checkout "$COMMIT"
          git submodule update --init --recursive --depth 1

      - name: Build OpenCV Python wheels
        run: |
          cd opencv-python
          export OPENCV_VERSION="${{ steps.version.outputs.version }}"
          export ENABLE_CONTRIB=0
          export ENABLE_HEADLESS=1
          export CMAKE_ARGS="-DWITH_GSTREAMER=ON -DWITH_FFMPEG=ON -DWITH_CAROTENE=ON -DWITH_LAPACK=ON -DBUILD_opencv_python3=ON -DWITH_AVIF=OFF -DWITH_GTK=OFF -DWITH_QT=OFF -DWITH_CUDA=OFF -DBUILD_opencv_java=OFF -DWITH_VTK=OFF -DBUILD_opencv_dnn=OFF -DBUILD_opencv_dnn_modern=OFF"
          pip3 wheel . --verbose --no-deps

      - name: Upload wheel files
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-wheels
          path: opencv-python/opencv_python_headless*.whl

      - name: Create or update release
        if: steps.version.outputs.release_version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="opencv/${VERSION}"
          REPO="${{ github.repository }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Deleting..."
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            opencv-python/opencv_python_headless*.whl \
            --repo "$REPO" \
            --latest=false \
            --title "opencv-python-headless $VERSION" \
            --notes "OpenCV Python headless wheel version $VERSION optimized for ARM64 architecture with GStreamer and FFmpeg support."
